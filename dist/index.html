<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prawdziwe AR (WebXR) - Chodzenie wokół obiektów</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <style>
        /* Styl, który uwalnia przycisk AR spod znaku wodnego */
        .a-enter-vr {
            bottom: 80px !important; /* Przesuwa przycisk w górę (domyślnie jest 20px) */
            right: 20px !important;  /* Odstęp od prawej krawędzi */
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene webxr="requiredFeatures: local-floor;">
        
        <a-box position="-1 0.5 -2" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
        <a-sphere position="0 1.25 -3" radius="0.5" color="#EF2D5E" shadow></a-sphere>
        <a-cylinder position="1 0.75 -2" radius="0.3" height="1.5" color="#FFC65D" shadow></a-cylinder>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

    </a-scene>

</body>
</html>
