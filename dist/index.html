<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prawdziwe AR (WebXR) - Naprawione Chodzenie</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene webxr="optionalFeatures: hit-test, local-floor; requiredFeatures: local-floor; referenceSpaceType: unbound">
        
        <a-box position="-0.3 0.2 -1" rotation="0 45 0" color="#4CC3D9" shadow scale="0.05 0.05 0.05"></a-box>
        <a-sphere position="0 0.4 -1.5" radius="1.25" color="#EF2D5E" shadow scale="0.05 0.05 0.05"></a-sphere>
        <a-cylinder position="0.3 0.3 -1" radius="0.5" height="1.5" color="#FFC65D" shadow scale="0.05 0.05 0.05"></a-cylinder>
        
        <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 2 1"></a-entity>

        <a-entity camera look-controls></a-entity>
        
    </a-scene>

</body>
</html>
