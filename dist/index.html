<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene webxr="requiredFeatures: local-floor;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/481e13724ab6490da93bfedd809e5d8c.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        // Funkcja losująca liczbę z danego przedziału [min, max]
        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Czekamy na załadowanie sceny
        document.querySelector('a-scene').addEventListener('loaded', function () {
            const rzezba = document.getElementById('rzezba');

            // Losowanie pozycji (X, Y, Z) wokół widza
            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-3, 5);
            const z = losujPrzedzial(-5, 5);

            // Ustawienie wylosowanej pozycji dla modelu rzeźby
            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            console.log(`Model pojawił się na pozycji: X: ${x.toFixed(2)}, Y: ${y.toFixed(2)}, Z: ${z.toFixed(2)}`);
        });
    </script>

</body>
</html>
