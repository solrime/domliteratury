<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Naprawione AR - Chodzenie wokół obiektów</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
      webxr="optionalFeatures: local-floor, hit-test; requiredFeatures: local-floor;"
      xr-mode-ui="enabled: true; XRMode: ar;"
      renderer="colorManagement: true;">
        
        <a-box position="-1 0.5 -2" rotation="0 45 0" color="#4CC3D9"></a-box>
        <a-sphere position="0 1.25 -3" radius="0.5" color="#EF2D5E"></a-sphere>
        <a-cylinder position="1 0.75 -2" radius="0.3" height="1" color="#FFC65D"></a-cylinder>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        
    </a-scene>

</body>
</html>
