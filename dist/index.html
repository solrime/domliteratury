<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        body, html {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <video id="webcam" autoplay playsinline></video>

    <a-scene webxr="requiredFeatures: local-floor;" style="background: transparent;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow visible="false"></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        const video = document.getElementById('webcam');
        const rzezba = document.getElementById('rzezba');

        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        function zainicjujRzezbe() {
            // 1. Losowanie pozycji (X, Y, Z)
            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-3, 5);
            const z = losujPrzedzial(-5, 5);

            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            // 2. OBLICZANIE ROTACJI (żeby koń patrzył na kamerę w punkcie 0, 0)
            // atan2 zwraca kąt w radianach, zamieniamy go na stopnie (* 180 / Math.PI)
            let katY = Math.atan2(x, z) * (180 / Math.PI);
            
            // W zależności od tego, jak model konia został wyeksportowany w Blenderze,
            // domyślnie może być obrócony bokiem lub tyłem. 
            // Jeśli koń patrzy w bok, zmień poniższe '+ 180' na: + 0, + 90, lub - 90.
            const korektaModelu = 180; 
            katY += korektaModelu;

            // 3. Warunek wysokości (sufit / ziemia) z zachowaniem rotacji Y
            let katZ = 0;
            if (y > 1.6) {
                katZ = 180; // do góry nogami na suficie
                console.log(`[SUFIT] Koń nad widzem (Y: ${y.toFixed(2)}m) - obrócono do góry nogami!`);
            } else {
                console.log(`[ZPOZYCJONOWANO] Koń na standardowej wysokości (Y: ${y.toFixed(2)}m)`);
            }

            // Aplikujemy wyliczoną rotację (X: 0, Y: rotacja na widza, Z: sufit/podłoga)
            rzezba.setAttribute('rotation', `0 ${katY} ${katZ}`);

            // Pokazujemy model dopiero po ustawieniu pozycji i rotacji
            rzezba.setAttribute('visible', 'true');
        }

        // Odpalamy kamerę
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    const scene = document.querySelector('a-scene');
                    if (scene.hasLoaded) {
                        zainicjujRzezbe();
                    } else {
                        scene.addEventListener('loaded', zainicjujRzezbe);
                    }
                })
                .catch(function(error) {
                    console.error("Błąd dostępu do kamery: ", error);
                });
        }
    </script>

</body>
</html>
