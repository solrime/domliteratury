<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        body, html {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <video id="webcam" autoplay playsinline></video>

    <a-scene webxr="requiredFeatures: local-floor;" style="background: transparent;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow visible="false"></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        const video = document.getElementById('webcam');
        const rzezba = document.getElementById('rzezba');

        // Funkcja losująca pozycję (ta sama, którą miałeś)
        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Główna logika pozycjonowania (wyciągnięta do osobnej funkcji)
        function zainicjujRzezbe() {
            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-3, 5);
            const z = losujPrzedzial(-5, 5);

            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            if (y > 1.6) {
                rzezba.setAttribute('rotation', '0 0 180');
                console.log(`[SUFIT] Model nad widzem (Y: ${y.toFixed(2)}m) - obrócono do góry nogami!`);
            } else {
                rzezba.setAttribute('rotation', '0 0 0');
                console.log(`[ZPOZYCJONOWANO] Model na standardowej wysokości (Y: ${y.toFixed(2)}m)`);
            }

            // KLUCZOWY MOMENT: Pokazujemy rzeźbę dopiero teraz!
            rzezba.setAttribute('visible', 'true');
        }

        // Odpalamy kamerę
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    // Kamera ruszyła! Sprawdzamy czy scena A-Frame jest już załadowana
                    const scene = document.querySelector('a-scene');
                    if (scene.hasLoaded) {
                        zainicjujRzezbe();
                    } else {
                        // Jeśli scena jeszcze się ładuje, czekamy na zdarzenie 'loaded'
                        scene.addEventListener('loaded', zainicjujRzezbe);
                    }
                })
                .catch(function(error) {
                    // Jeśli użytkownik odrzuci kamerę, rzeźba nigdy się nie pokaże (visible zostanie false)
                    console.error("Błąd dostępu do kamery lub użytkownik odmówił: ", error);
                });
        }
    </script>

</body>
</html>
