<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi - AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        webxr="requiredFeatures: local-floor; optionalFeatures: hit-test;" 
        renderer="colorManagement: true; alpha: true;"
        background="transparent: true;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        document.querySelector('a-scene').addEventListener('loaded', function () {
            const rzezba = document.getElementById('rzezba');

            // Losowanie pozycji (X, Y, Z)
            // Zmieniono domyślny przedział Z na ujemny (-1 do -4), żeby model nie pojawiał się ZA plecami widza na starcie
            const x = losujPrzedzial(-2, 2);
            const y = losujPrzedzial(0, 3); // Zmniejszono rozrzut w dół, by model nie wpadał pod podłogę
            const z = losujPrzedzial(-1, -4); 

            // Ustawienie wylosowanej pozycji
            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
          
        });
    </script>

</body>
</html>
