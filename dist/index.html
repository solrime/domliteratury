<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* Styl dla wideo z kamery – wypełnia cały ekran i jest pod sceną 3D */
        #webcam {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        body, html {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <video id="webcam" autoplay playsinline></video>

    <a-scene webxr="requiredFeatures: local-floor;" style="background: transparent;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 2;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 2;" position="1 4 1"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        // Skrypt uruchamiający kamerę użytkownika w tle
        const video = document.getElementById('webcam');
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            // "facingMode: environment" wymusza użycie tylnej kamery w telefonie
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(function(stream) {
                    video.srcObject = stream;
                })
                .catch(function(error) {
                    console.error("Błąd dostępu do kamery: ", error);
                });
        }

        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        document.querySelector('a-scene').addEventListener('loaded', function () {
            const rzezba = document.getElementById('rzezba');

            // Losowanie pozycji (X, Y, Z)
            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-3, 5);
            const z = losujPrzedzial(-5, 5);

            // Ustawienie wylosowanej pozycji
            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            // Warunek: Jeśli pozycja Y jest wyższa niż wysokość oczu widza (1.6m)
            if (y > 1.6) {
                // Obracamy model o 180 stopni w osi Z (będzie do góry nogami)
                rzezba.setAttribute('rotation', '0 0 180');
                console.log(`[SUFIT] Model nad widzem (Y: ${y.toFixed(2)}m) - obrócono do góry nogami!`);
            } else {
                // Standardowa rotacja, jeśli jest na ziemi lub pod widzem
                rzezba.setAttribute('rotation', '0 0 0');
                console.log(`[ZPOZYCJONOWANO] Model na standardowej wysokości (Y: ${y.toFixed(2)}m)`);
            }
        });
    </script>

</body>
</html>
