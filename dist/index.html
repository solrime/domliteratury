<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi - AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay;"
        xr-mode-ui="enabled: true;"
        vr-mode-ui="enabled: false;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>

        <!-- Tło z kamery - działa w AR -->
        <a-entity id="arBackground" 
            camera="active: false;"
            material="shader: background; color: #000000;"
            wasd-controls="enabled: false;"
            look-controls="enabled: false;"
            position="0 0 0">
        </a-entity>

        <!-- Model 3D -->
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow></a-gltf-model>
        
        <!-- Oświetlenie -->
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <!-- Kamera z kontrolami -->
        <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        document.querySelector('a-scene').addEventListener('loaded', function () {
            const rzezba = document.getElementById('rzezba');

            // Losowanie pozycji (X, Y, Z)
            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-3, 5);
            const z = losujPrzedzial(-5, 5);

            // Ustawienie wylosowanej pozycji
            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            // Warunek: Jeśli pozycja Y jest wyższa niż wysokość oczu widza (1.6m)
            if (y > 1.6) {
                // Obracamy model o 180 stopni w osi Z (będzie do góry nogami)
                rzezba.setAttribute('rotation', '0 0 180');
                console.log(`[SUFIT] Model nad widzem (Y: ${y.toFixed(2)}m) - obrócono do góry nogami!`);
            } else {
                // Standardowa rotacja, jeśli jest na ziemi lub pod widzem
                rzezba.setAttribute('rotation', '0 0 0');
                console.log(`[ZPOZYCJONOWANO] Model na standardowej wysokości (Y: ${y.toFixed(2)}m)`);
            }
        });
    </script>

</body>
</html>
