<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
        // Rejestracja własnego komponentu o nazwie 'losowa-pozycja'
        AFRAME.registerComponent('losowa-pozycja', {
            init: function () {
                // Definiujemy zakresy losowania (w metrach)
                const minX = -5, maxX = 5;
                const minZ = -7, maxZ = -2;

                // Losujemy współrzędne X oraz Z
                const randomX = Math.random() * (maxX - minX) + minX;
                const randomZ = Math.random() * (maxZ - minZ) + minZ;
                const Y = 0.75; // Stała wysokość, żeby cylinder stał na ziemi

                // Ustawiamy nową pozycję elementu
                this.el.setAttribute('position', `${randomX} ${Y} ${randomZ}`);
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene webxr="requiredFeatures: local-floor;">
 
        <a-cylinder losowa-pozycja radius="0.3" height="1.5" color="#FFC65D" shadow></a-cylinder>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

    </a-scene>

</body>
</html>
