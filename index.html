<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Literatury w Łodzi - AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="model-rzeźby" src="https://cdn.tinyglb.com/models/1ee4ff430e044f5bb446268700baf32b.glb"></a-asset-item>
        </a-assets>
 
        <a-gltf-model id="rzezba" src="#model-rzeźby" shadow></a-gltf-model>
        
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; castShadow: true; intensity: 0.8;" position="1 4 1"></a-entity>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        function losujPrzedzial(min, max) {
            return Math.random() * (max - min) + min;
        }

        document.querySelector('a-scene').addEventListener('loaded', function () {
            const rzezba = document.getElementById('rzezba');

            const x = losujPrzedzial(-5, 5);
            const y = losujPrzedzial(-1, 3); // Zmniejszyłem lekko rozrzut Y, żeby model nie uciekał za bardzo pod ziemię
            const z = losujPrzedzial(-5, -2); // Model losuje się z przodu (ujemne Z), żeby użytkownik go od razu widział

            rzezba.setAttribute('position', `${x} ${y} ${z}`);
            
            if (y > 1.6) {
                rzezba.setAttribute('rotation', '0 0 180');
                console.log(`[SUFIT] Model nad widzem (Y: ${y.toFixed(2)}m) - obrócono do góry nogami!`);
            } else {
                rzezba.setAttribute('rotation', '0 0 0');
                console.log(`[ZPOZYCJONOWANO] Model na standardowej wysokości (Y: ${y.toFixed(2)}m)`);
            }
        });
    </script>
</body>
</html>
