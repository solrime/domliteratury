<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proste AR w A-Frame</title>
    <!-- Główna biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Komponent AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Inicjalizacja sceny AR bez szukania markerów (embedded arjs) -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- BAZOWE KSZTAŁTY -->
        <!-- Czerwony boks zawieszony w przestrzeni -->
        <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
        
        <!-- Żółta sferka -->
        <a-sphere position="0 1.2 -5" radius="1.25" color="#EF2D5E"></a-sphere>
        
        <!-- Zielony cylinder -->
        <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
        
        <!-- Szary "wirtualny" grunt (opcjonalny, pomaga złapać perspektywę) -->
        <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" opacity="0.5"></a-plane>

        <!-- Kamera, która śledzi ruch telefonu -->
        <a-entity camera></a-entity>
        
    </a-scene>

</body>
</html>
